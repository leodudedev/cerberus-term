<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus</title>
    <style>
      /* Theme tokens. Default = dark; [data-theme="light"] overrides. applyPref()
         stamps data-theme on <html>. */
      :root,
      :root[data-theme='dark'] {
        --bg: #1a1a1a;
        --panel: #232323;
        --input-bg: #1a1a1a;
        --text: #e0e0e0;
        --muted: #9aa0a0;
        --border: #3a3a3a;
        --header-border: #111;
        --accent: #4a9d7f;
        --accent-text: #0d1512;
        --header-focus: #2b3a34;
        --splitter: #2a2a2a;
        --btn-hover: #3a3a3a;
        --error: #e06c6c;
        --hint: #7a8a80;
        --overlay: rgba(0, 0, 0, 0.5);
      }
      :root[data-theme='light'] {
        --bg: #f5f5f5;
        --panel: #ececec;
        --input-bg: #ffffff;
        --text: #1a1a1a;
        --muted: #5a5a5a;
        --border: #cccccc;
        --header-border: #d0d0d0;
        --accent: #2f7d63;
        --accent-text: #ffffff;
        --header-focus: #d5e8e0;
        --splitter: #d0d0d0;
        --btn-hover: #dcdcdc;
        --error: #c0392b;
        --hint: #5a7a70;
        --overlay: rgba(0, 0, 0, 0.35);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
      }
      /* workspace: tab strip on top, pane viewport below */
      .workspace {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }
      .tabbar {
        display: flex;
        align-items: center;
        flex: 0 0 34px;
        gap: 2px;
        padding: 0 4px;
        background: var(--panel);
        border-bottom: 1px solid var(--header-border);
        font-family: system-ui, sans-serif;
        overflow-x: auto;
        user-select: none;
      }
      .tabs-viewport {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
      }
      .tab-container {
        position: absolute;
        inset: 0;
      }
      .tab-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        max-width: 200px;
        height: 24px;
        padding: 0 4px 0 10px;
        border-radius: 5px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        cursor: pointer;
      }
      .tab-chip:hover {
        background: var(--btn-hover);
      }
      .tab-chip.active {
        background: var(--header-focus);
        color: var(--text);
      }
      .tab-chip-title {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tab-chip-input {
        width: 120px;
        height: 20px;
        padding: 0 4px;
        border: 1px solid var(--accent);
        border-radius: 3px;
        background: var(--input-bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        font-size: 12px;
        outline: none;
      }
      .tab-chip-close {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--muted);
        font-size: 10px;
        line-height: 1;
        cursor: pointer;
        opacity: 0;
      }
      .tab-chip:hover .tab-chip-close,
      .tab-chip.active .tab-chip-close {
        opacity: 0.7;
      }
      .tab-chip-close:hover {
        background: var(--btn-hover);
        color: var(--text);
        opacity: 1;
      }
      .tab-new {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }
      .tab-new:hover {
        background: var(--btn-hover);
        color: var(--text);
      }
      /* focused pane highlight; inset outline so it doesn't shift layout */
      .pane.focused {
        outline: 1px solid var(--accent);
        outline-offset: -1px;
      }
      .splitter:hover {
        background: var(--accent) !important;
      }
      .pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex: 0 0 26px;
        padding: 0 6px;
        background: var(--panel);
        border-bottom: 1px solid var(--header-border);
        font-family: system-ui, sans-serif;
        font-size: 11px;
        user-select: none;
      }
      .pane.focused .pane-header {
        background: var(--header-focus);
      }
      .pane-title {
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pane-buttons {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .pane-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-variant-emoji: text;
        line-height: 1;
        cursor: pointer;
      }
      .pane-btn:hover {
        background: var(--btn-hover);
        color: var(--text);
      }
      .pane-btn-star-active {
        color: #e0b84a;
      }
      .pane-btn-star-active:hover {
        color: #e0b84a;
      }
      /* favorites overlay */
      .favorites-modal {
        width: min(480px, 90vw);
        max-height: 60vh;
      }
      .favorites-list {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .favorites-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
      .favorites-row:hover {
        background: var(--btn-hover);
      }
      .favorites-path {
        color: var(--text);
        font-family: Menlo, Monaco, monospace;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .favorites-remove {
        flex: 0 0 auto;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        line-height: 1;
        cursor: pointer;
        padding: 2px 5px;
        border-radius: 3px;
        opacity: 0;
        transition: opacity 0.1s;
      }
      .favorites-row:hover .favorites-remove {
        opacity: 1;
      }
      .favorites-remove:hover {
        background: var(--btn-hover);
        color: var(--error);
      }
      /* config editor modal */
      .config-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--overlay);
        z-index: 100;
        font-family: system-ui, sans-serif;
      }
      .config-modal {
        display: flex;
        flex-direction: column;
        width: min(680px, 90vw);
        max-height: 80vh;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        gap: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .config-path {
        color: var(--muted);
        font-size: 12px;
        font-family: Menlo, Monaco, monospace;
        word-break: break-all;
      }
      .config-textarea {
        flex: 1 1 auto;
        min-height: 240px;
        resize: vertical;
        background: var(--input-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px;
        font-family: Menlo, Monaco, monospace;
        font-size: 13px;
        line-height: 1.5;
        tab-size: 2;
      }
      .config-error {
        color: var(--error);
        font-size: 12px;
        min-height: 14px;
        font-family: Menlo, Monaco, monospace;
      }
      .config-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .config-buttons button {
        padding: 6px 16px;
        border: 0;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .config-cancel {
        background: var(--btn-hover);
        color: var(--text);
      }
      .config-save {
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 600;
      }
      /* settings form */
      .settings-modal {
        gap: 8px;
      }
      .settings-title {
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .settings-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .settings-label {
        flex: 0 0 150px;
        color: var(--muted);
        font-size: 12px;
      }
      .settings-input {
        flex: 1 1 auto;
        background: var(--input-bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 8px;
        font-family: Menlo, Monaco, monospace;
        font-size: 12px;
      }
      .settings-hint {
        color: var(--hint);
        font-size: 11px;
        margin-top: 2px;
      }
      .settings-checkbox {
        width: 15px;
        height: 15px;
        margin: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }
      /* confirm dialog */
      .confirm-modal {
        width: min(400px, 90vw);
        gap: 14px;
      }
      .confirm-message {
        color: var(--text);
        font-size: 13px;
        line-height: 1.5;
      }
      .confirm-danger {
        padding: 6px 16px;
        border: 0;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: var(--error);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
