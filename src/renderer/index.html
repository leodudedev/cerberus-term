<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        overflow: hidden;
      }
      /* focused pane highlight; inset outline so it doesn't shift layout */
      .pane.focused {
        outline: 1px solid #4a9d7f;
        outline-offset: -1px;
      }
      .splitter:hover {
        background: #4a9d7f !important;
      }
      .pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex: 0 0 26px;
        padding: 0 6px;
        background: #232323;
        border-bottom: 1px solid #111;
        font-family: system-ui, sans-serif;
        font-size: 11px;
        user-select: none;
      }
      .pane.focused .pane-header {
        background: #2b3a34;
      }
      .pane-title {
        color: #9aa0a0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pane-buttons {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .pane-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: #9aa0a0;
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
      }
      .pane-btn:hover {
        background: #3a3a3a;
        color: #e0e0e0;
      }
      .pane-btn-gear {
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
