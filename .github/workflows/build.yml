name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to publish GitHub Releases

jobs:
  dist:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm install runs the @electron/rebuild postinstall, building node-pty
      # against the Electron ABI for this OS (ConPTY on Windows).
      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm exec electron-vite build

      # On a tag -> build + publish installers to a GitHub Release.
      # Otherwise (manual run) -> build only.
      - name: Package (+ publish on tags)
        run: >-
          pnpm exec electron-builder
          --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: cerberus-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
