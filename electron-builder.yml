appId: com.cerberus.term
productName: Cerberus

directories:
  output: dist
  buildResources: build

# electron-vite output + manifest. Prod dependencies (node-pty, grammy) are
# collected by electron-builder automatically.
files:
  - out/**/*
  - package.json
  - '!**/*.map'

# A native .node can't be loaded from inside the asar archive.
asarUnpack:
  - '**/node_modules/node-pty/**'

# Ship the Cerberus CLI hooks next to the app (shell can't exec inside asar);
# they land in process.resourcesPath/hooks.
extraResources:
  - from: resources/hooks
    to: hooks
    filter:
      - '**/*'
  - from: resources/bin
    to: bin
    filter:
      - '**/*'

# node-pty is already built against the Electron ABI by the @electron/rebuild
# postinstall on the build host.
npmRebuild: false

# Publish to GitHub Releases (owner/repo inferred from the git remote in CI).
# releaseType: release publishes immediately so releases/latest/download works
# (the default 'draft' leaves it invisible to the "latest" URL).
publish:
  provider: github
  releaseType: release

# Stable, version-less artifact names so README can link to
# releases/latest/download/<name> permanently.
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: ${productName}-mac-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-win-${arch}.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Development
  maintainer: Leonardo Pinori <pinori@gmail.com>
  artifactName: ${productName}-linux-${arch}.${ext}
