<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerberus</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        overflow: hidden;
      }
      /* focused pane highlight; inset outline so it doesn't shift layout */
      .pane.focused {
        outline: 1px solid #4a9d7f;
        outline-offset: -1px;
      }
      .splitter:hover {
        background: #4a9d7f !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
